<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
  <script src="./js/header.js" defer></script>
</head>
<body class="h-screen flex flex-col">
  <header class="w-full font-handwriting">
    <div class="flex flex-row items-center h-14 px-4 justify-between lg:justify-start">
        <!-- ロゴ -->
        <a class="text-xl" href="./index.html">Cafe Recursion</a>

        <!-- デスクトップメニュー（lg以上で表示） -->
        <div class="hidden lg:block">
          <div class="ml-4 flex flex-row items-baseline space-x-2">
              <a class="px-3 py-2 rounded-md text-sm font-medium" href="./index.html">Home</a>
              <a class="px-3 py-2 rounded-md text-sm font-medium" href="./drink.html">Drink</a>
              <a class="px-3 py-2 rounded-md text-sm font-medium" href="./sweets.html">Sweets</a>
              <a class="px-3 py-2 rounded-md text-sm font-medium" href="./food.html">Food</a>
              <a class="px-3 py-2 rounded-md text-sm font-medium" href="./information.html">Information</a>
          </div>
        </div>

        <!-- モバイルトグルボタン（lg未満で表示） -->
        <button id="mobile-menu-toggle" class="lg:hidden inline-flex items-center justify-center p-2 rounded-md text-gray-600 hover:text-gray-900 hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer" type="button"  aria-label="Toggle navigation menu" aria-expanded="false">
          <!-- ハンバーガーアイコン -->
          <svg id="hamburger-icon" class="block h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <!-- クローズアイコン -->
          <svg id="close-icon" class="hidden h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
    </div>

    <!-- モバイルメニュー（トグルで表示/非表示） -->
    <div id="mobile-menu" class="lg:hidden hidden absolute bg-gray-200 w-full">
        <div class="px-2 pt-2 pb-3 space-y-1 border-t border-gray-200">
          <a href="./index.html" class="block px-3 py-2 rounded-md text-base font-medium">Home</a>
          <a href="./drink.html" class="block px-3 py-2 rounded-md text-base font-medium">Drink</a>
          <a href="./sweets.html" class="block px-3 py-2 rounded-md text-base font-medium">Sweets</a>
          <a href="./food.html" class="block px-3 py-2 rounded-md text-base font-medium">Food</a>
          <a href="./information.html" class="block px-3 py-2 rounded-md text-base font-medium">Information</a>
        </div>
    </div>
  </header>
  <div class="slider w-full overflow-hidden h-[210px] sm:h-[350px]">
    <div class="slide-container flex flex-row h-full w-[500%] animate-slide">
      <div class="image w-1/5">
        <img src="./images/rainbow-cake.jpg" alt="Rainbow cake" class="w-full h-full object-cover">
      </div>
      <div class="image w-1/5">
        <img src="./images/fruit-cake.jpg" alt="Fruit cake" class="w-full h-full object-cover">
      </div>
      <div class="image w-1/5">
        <img src="./images/short-cake.jpg" alt="Short cake" class="w-full h-full object-cover">
      </div>
      <div class="image w-1/5">
        <img src="./images/strawberry-cake.jpg" alt="Strawberry cake" class="w-full h-full object-cover">
      </div>
      <div class="image w-1/5">
        <img src="./images/rainbow-cake.jpg" alt="Rainbow cake" class="w-full h-full object-cover">
      </div>
    </div>
  </div>

  <div class="flex flex-1 flex-col items-center">
    <h1 class="greeting font-handwriting text-4xl my-7 text-center text-stone-400">
      Welcome to Cafe Recursion
    </h1>
    <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0">
      <div class="flex flex-col items-center sm:w-1/2 mx-5 p-4 bg-neutral-100 border border-gray-300 rounded-lg shadow-lg space-y-2">
        <h2 class="font-handwriting text-3xl">What's new?</h2>
        <div class="flex items-center space-x-2 h-full">
          <div class="text-lg text-gray-700">
            春の新メニュー「フルーツタルト」をご用意しました。新鮮なフルーツと生クリームのハーモニーをお楽しみください。
          </div>
          <img src="./images/fruit-tart.jpg" alt="fruit-tart" class="w-1/2 max-w-60 aspect-square object-cover">
        </div>
      </div>
      <div class="flex flex-col items-center sm:w-1/2 mx-5 p-4 bg-neutral-100 border border-gray-300 rounded-lg shadow-lg space-y-2">
        <h2 class="font-handwriting text-3xl">Recommendation</h2>
        <div class="flex items-center space-x-2 h-full">
          <div class="text-lg text-gray-700">
            今月のお薦めは「ラムダブレンド」。やや苦みのある上品な香りのコーヒーです。
          </div>
          <img src="./images/coffee-beans.jpg" alt="fruit-tart" class="w-1/2 max-w-60 aspect-square object-cover">
        </div>
      </div>
    </div>
  </div>
  
  <footer class="w-full">
    <div class="text-right mb-2 px-2">© 2025 Cafe Recursion. All Rights Reserved.</div>
  </footer>
</body>
</html>
